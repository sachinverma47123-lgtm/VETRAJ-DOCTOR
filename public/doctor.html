<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vetraj — Doctor Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--navy:#0a1628;--blue:#1a5a8a;--cyan:#00d4e8;--green:#16a34a;--red:#dc2626;--gold:#f59e0b;--bg:#f0f9ff;--white:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;}
body{background:var(--bg);font-family:'Poppins',sans-serif;color:var(--text);}

/* LOGIN */
.lp{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy),#1a5a8a);padding:20px;}
.lc{background:#fff;border-radius:20px;padding:28px 22px;width:100%;max-width:320px;}
.lc-top{text-align:center;margin-bottom:18px;}
.lc-top h1{font-size:18px;font-weight:800;color:var(--navy);}
.lc-top p{font-size:11px;color:var(--muted);margin-top:3px;}
.fi{margin-bottom:12px;}
.fi label{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--navy);display:block;margin-bottom:4px;}
.fi input,.fi select{width:100%;padding:10px 13px;border:2px solid var(--border);border-radius:9px;font-family:'Poppins',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.fi input:focus,.fi select:focus{border-color:var(--blue);}
.lbtn{width:100%;padding:13px;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;border:none;border-radius:11px;font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.lerr{background:#fee2e2;color:var(--red);font-size:11px;padding:7px 12px;border-radius:8px;text-align:center;margin-top:8px;display:none;}

/* APP */
.app{display:none;flex-direction:column;min-height:100vh;}
.app.show{display:flex;}

/* HEADER */
.hdr{background:linear-gradient(135deg,var(--navy),var(--blue));padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;}
.hdr-logo{width:34px;height:34px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;}
.hdr-mid{flex:1;}
.hdr-nm{font-size:13px;font-weight:800;color:#fff;}
.hdr-sp{font-size:10px;color:rgba(255,255,255,.6);}
.hdr-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-out{background:rgba(255,255,255,.1);color:#fff;border:none;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;}

/* TABS */
.tabs{background:#fff;border-bottom:2px solid var(--border);display:flex;}
.tab{flex:1;padding:11px 8px;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;text-align:center;border-bottom:3px solid transparent;}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);}

/* CONTENT */
.pg{display:none;padding:14px;}
.pg.on{display:block;}

/* STAT GRID */
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.sc{background:#fff;border-radius:12px;padding:11px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center;border-top:3px solid var(--blue);}
.sc.g{border-top-color:var(--green);}
.sc.o{border-top-color:var(--gold);}
.sc-n{font-size:22px;font-weight:900;color:var(--navy);}
.sc-l{font-size:10px;color:var(--muted);font-weight:600;}

/* CONSULTATION CARDS */
.ccard{background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:10px;border-left:4px solid var(--blue);}
.ccard.urgent{border-left-color:var(--red);}
.ccard.done{border-left-color:var(--green);opacity:.7;}
.cc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.cc-nm{font-size:15px;font-weight:800;color:var(--navy);}
.cc-pet{font-size:12px;color:var(--blue);font-weight:600;}
.cc-time{font-size:11px;color:var(--muted);text-align:right;}
.cc-slot{font-size:13px;font-weight:700;color:var(--navy);}
.cc-body{background:#f8fafc;border-radius:9px;padding:9px 11px;margin-bottom:10px;}
.cc-row{display:flex;gap:8px;margin-bottom:4px;font-size:12px;}
.cc-row:last-child{margin-bottom:0;}
.cc-lbl{color:var(--muted);font-weight:600;min-width:55px;}
.cc-val{color:var(--text);font-weight:500;flex:1;}
.cc-prob{font-size:12px;color:var(--text);line-height:1.6;background:#fffbeb;border-left:3px solid var(--gold);padding:8px 10px;border-radius:0 8px 8px 0;margin-bottom:10px;}
.cc-btns{display:flex;gap:6px;flex-wrap:wrap;}
.cbtn{padding:7px 13px;border-radius:9px;border:none;font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;cursor:pointer;}
.cbtn.done{background:var(--green);color:#fff;}
.cbtn.call{background:var(--blue);color:#fff;}
.cbtn.rx{background:var(--gold);color:#1c1917;}
.cbtn.vid{background:#7c3aed;color:#fff;}

/* VIDEO PREVIEW */
.vid-wrap{background:#0f172a;border-radius:10px;padding:10px;margin-bottom:8px;text-align:center;}
.vid-lbl{font-size:11px;color:#94a3b8;margin-bottom:6px;}
.vid-frame{width:100%;max-height:200px;border-radius:8px;object-fit:contain;}
.vid-link{color:var(--cyan);font-size:12px;text-decoration:none;}

/* PRESCRIPTION MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.mbg.show{display:flex;}
.mc{background:#fff;border-radius:20px 20px 0 0;padding:18px;width:100%;max-height:90vh;overflow-y:auto;}
.mc-h{font-size:15px;font-weight:800;color:var(--navy);margin-bottom:14px;display:flex;justify-content:space-between;}
.mc-x{background:#f1f5f9;border:none;width:26px;height:26px;border-radius:50%;font-size:12px;cursor:pointer;}
.med-item{display:flex;align-items:center;gap:10px;padding:9px;border:2px solid var(--border);border-radius:10px;margin-bottom:7px;cursor:pointer;}
.med-item.on{border-color:var(--blue);background:#eff6ff;}
.med-nm{font-size:13px;font-weight:700;color:var(--navy);flex:1;}
.med-cat{font-size:10px;color:var(--muted);}
.med-stk{font-size:11px;font-weight:700;}
.stk-ok{color:var(--green);}
.stk-low{color:var(--red);}
.mc-notes{width:100%;padding:10px;border:2px solid var(--border);border-radius:9px;font-family:'Poppins',sans-serif;font-size:13px;resize:none;height:70px;outline:none;margin:10px 0;}
.mc-notes:focus{border-color:var(--blue);}
.mc-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;border:none;border-radius:11px;font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.mc-btn.wa{background:linear-gradient(135deg,#065f46,#059669);margin-top:6px;}

/* MEDICINES TAB */
.mcard{background:#fff;border-radius:12px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:8px;display:flex;align-items:center;gap:11px;}
.mico{font-size:22px;flex-shrink:0;}
.minfo{flex:1;}
.mnm{font-size:13px;font-weight:700;color:var(--navy);}
.mcat{font-size:10px;color:var(--muted);}
.mprice{font-size:12px;font-weight:600;color:var(--blue);}
.mstk{font-size:12px;font-weight:700;}
.mbdg{display:inline-block;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.mbdg.ok{background:#dcfce7;color:#15803d;}
.mbdg.low{background:#fee2e2;color:var(--red);}
.mrec{background:#fef3c7;color:#92400e;font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;margin-top:3px;display:inline-block;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:9px 18px;border-radius:22px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.empty{text-align:center;padding:28px;color:var(--muted);}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="lp" id="lp">
  <div class="lc">
    <div class="lc-top">
      <div style="font-size:36px;margin-bottom:8px;">👨‍⚕️</div>
      <h1>Doctor Panel</h1>
      <p>Vetraj Pet Hospital — Doctor Login</p>
    </div>
    <div class="fi">
      <label>Apna Naam Select Karein</label>
      <select id="doc-select">
        <option value="">— Doctor select karein —</option>
      </select>
    </div>
    <div class="fi">
      <label>Password</label>
      <input id="dp" type="password" placeholder="Password..." onkeydown="if(event.key==='Enter')docLogin()">
    </div>
    <button class="lbtn" onclick="docLogin()">🔐 Login</button>
    <div class="lerr" id="lerr">❌ Galat password</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="hdr">
    <div class="hdr-logo">👨‍⚕️</div>
    <div class="hdr-mid">
      <div class="hdr-nm" id="hdr-nm">Dr. —</div>
      <div class="hdr-sp" id="hdr-sp">Vetraj Pet Hospital</div>
    </div>
    <div class="hdr-dot"></div>
    <button class="hdr-out" onclick="logout()">Logout</button>
  </div>

  <div class="tabs">
    <div class="tab on" onclick="showPg('consult','today')">📋 Aaj Ke</div>
    <div class="tab" onclick="showPg('consult','all')">📅 All</div>
    <div class="tab" onclick="showPg('meds')">💊 Medicines</div>
  </div>

  <!-- CONSULTATIONS -->
  <div class="pg on" id="pg-consult">
    <div class="sg">
      <div class="sc"><div class="sc-n" id="st-today">0</div><div class="sc-l">Aaj Ke</div></div>
      <div class="sc g"><div class="sc-n" id="st-done">0</div><div class="sc-l">Done</div></div>
      <div class="sc o"><div class="sc-n" id="st-pend">0</div><div class="sc-l">Pending</div></div>
    </div>
    <div id="consult-list"></div>
  </div>

  <!-- MEDICINES -->
  <div class="pg" id="pg-meds">
    <div id="med-list"></div>
  </div>
</div>

<!-- PRESCRIPTION MODAL -->
<div class="mbg" id="rx-modal">
  <div class="mc">
    <div class="mc-h"><span>💊 Prescription</span><button class="mc-x" onclick="closeRx()">✕</button></div>
    <div id="rx-patient-info" style="background:#f8fafc;border-radius:9px;padding:10px;margin-bottom:12px;font-size:12px;"></div>
    <div style="font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;margin-bottom:8px;">Medicines Select Karein:</div>
    <div id="rx-med-list"></div>
    <textarea class="mc-notes" id="rx-notes" placeholder="Doctor ke notes... (diet, precautions, follow-up)"></textarea>
    <button class="mc-btn" onclick="saveRx()">✅ Prescription Save Karein</button>
    <button class="mc-btn wa" onclick="sendRxWA()">📤 WhatsApp Pe Bhejo</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BACKEND = window.location.origin;
const DOC_PASS = "doc@2024";
let myDoc = null, appointments = [], medicines = [], selAppt = null, selMeds = [];

// Load doctors for dropdown
async function loadDocSelect(){
  try{
    const r = await fetch(`${BACKEND}/get-doctors`);
    const d = await r.json();
    const sel = document.getElementById('doc-select');
    d.doctors.filter(x=>x.type==='vet'||x.type==='nutrition').forEach(doc=>{
      const o = document.createElement('option');
      o.value = doc.name; o.textContent = `${doc.name} (${doc.exp} saal)`;
      sel.appendChild(o);
    });
  }catch(e){}
}

function docLogin(){
  const name = document.getElementById('doc-select').value;
  const pass = document.getElementById('dp').value;
  if(!name){toast('⚠️ Doctor select karein');return;}
  if(pass !== DOC_PASS){document.getElementById('lerr').style.display='block';return;}
  myDoc = name;
  document.getElementById('lp').style.display='none';
  document.getElementById('app').classList.add('show');
  document.getElementById('hdr-nm').textContent = name;
  loadMyData();
}

function logout(){
  document.getElementById('app').classList.remove('show');
  document.getElementById('lp').style.display='flex';
  myDoc=null;
}

async function loadMyData(){
  try{
    const r = await fetch(`${BACKEND}/get-appointments?key=vetraj2024`);
    const d = await r.json();
    appointments = (d.appointments||[]).filter(a=>a.doctor===myDoc);
  }catch(e){appointments=[];}
  try{
    const r = await fetch(`${BACKEND}/get-medicines`);
    const d = await r.json();
    medicines = d.medicines||[];
  }catch(e){medicines=[];}
  renderConsults('today');
  renderMeds();
}

let viewMode = 'today';
function showPg(pg, mode){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById(`pg-${pg}`).classList.add('on');
  event.currentTarget.classList.add('on');
  if(pg==='consult'){viewMode=mode||'today';renderConsults(viewMode);}
}

function renderConsults(mode){
  const today = new Date().toLocaleDateString('en-IN');
  let data = appointments;
  if(mode==='today') data = appointments.filter(a=>a.date===today);
  const done = data.filter(a=>a.status==='done');
  const pend = data.filter(a=>a.status!=='done'&&a.status!=='refund');
  document.getElementById('st-today').textContent = appointments.filter(a=>a.date===today).length;
  document.getElementById('st-done').textContent = done.length;
  document.getElementById('st-pend').textContent = pend.length;

  const list = document.getElementById('consult-list');
  if(!data.length){
    list.innerHTML='<div class="empty">📋<br>Koi consultation nahi</div>';return;
  }
  list.innerHTML = data.map((a,i)=>{
    const isDone = a.status==='done';
    return `<div class="ccard ${isDone?'done':''}">
      <div class="cc-top">
        <div>
          <div class="cc-nm">${a.owner||'—'}</div>
          <div class="cc-pet">🐾 ${a.pet||'—'} ${a.petType?`(${a.petType})`:''}${a.petBreed?` · ${a.petBreed}`:''}</div>
        </div>
        <div class="cc-time">
          <div class="cc-slot">⏰ ${a.time||'TBD'}</div>
          <div>${a.date||'—'}</div>
        </div>
      </div>
      <div class="cc-body">
        <div class="cc-row"><span class="cc-lbl">Age:</span><span class="cc-val">${a.petAge||'—'}</span></div>
        <div class="cc-row"><span class="cc-lbl">Phone:</span><span class="cc-val"><a href="tel:${a.phone}" style="color:var(--blue);">📞 ${a.phone||'—'}</a></span></div>
        <div class="cc-row"><span class="cc-lbl">Status:</span><span class="cc-val">${isDone?'✅ Done':'🕐 Pending'}</span></div>
      </div>
      ${a.problem?`<div class="cc-prob">📋 <b>Problem:</b> ${a.problem}</div>`:''}
      ${a.mediaUrl?`<div class="vid-wrap"><div class="vid-lbl">📹 Uploaded Media</div><a href="${a.mediaUrl}" target="_blank" class="vid-link">📎 Media dekhen/download karein</a></div>`:''}
      <div class="cc-btns">
        ${!isDone?`<button class="cbtn done" onclick="markDone(${i})">✅ Done</button>`:''}
        <button class="cbtn call" onclick="window.open('tel:${a.phone}')">📞 Call</button>
        <button class="cbtn rx" onclick="openRx(${i})">💊 Prescription</button>
        <button class="cbtn" onclick="window.open('https://wa.me/91${a.phone}','_blank')" style="background:#25d366;color:#fff;">💬 WhatsApp</button>
      </div>
    </div>`;
  }).join('');
}

function renderMeds(){
  const list = document.getElementById('med-list');
  if(!medicines.length){list.innerHTML='<div class="empty">💊<br>Medicines load ho rahi hain</div>';return;}
  list.innerHTML = medicines.map(m=>`
    <div class="mcard">
      <div class="mico">💊</div>
      <div class="minfo">
        <div class="mnm">${m.name}</div>
        <div class="mcat">${m.category}</div>
        <div class="mprice">₹${m.price}</div>
        ${m.recommended?'<span class="mrec">⭐ Recommended</span>':''}
      </div>
      <div style="text-align:right;">
        <span class="mbdg ${m.stock>10?'ok':'low'}">${m.stock>10?'In Stock':'Low Stock'}</span>
        <div style="font-size:12px;color:var(--muted);margin-top:3px;">${m.stock} units</div>
      </div>
    </div>`).join('');
}

async function markDone(i){
  const a = appointments[i];
  try{
    await fetch(`${BACKEND}/update-appointment?key=vetraj2024`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:a.id,status:'done'})
    });
    appointments[i].status='done';
    renderConsults(viewMode);
    toast('✅ Consultation done mark ho gaya!');
  }catch(e){toast('❌ Update nahi ho paya');}
}

function openRx(i){
  selAppt = i; selMeds = [];
  const a = appointments[i];
  document.getElementById('rx-patient-info').innerHTML=`<b>${a.owner}</b> — 🐾 ${a.pet} ${a.petType?`(${a.petType})`:''}${a.petBreed?` · ${a.petBreed}`:''}<br>Problem: ${a.problem||'—'}`;
  const mlist = document.getElementById('rx-med-list');
  mlist.innerHTML = medicines.map((m,mi)=>`
    <div class="med-item" onclick="toggleMed(this,${mi})">
      <div style="flex:1;">
        <div class="med-nm">${m.name}</div>
        <div class="med-cat">${m.category} · ₹${m.price}</div>
      </div>
      <span class="med-stk ${m.stock>10?'stk-ok':'stk-low'}">${m.stock} units</span>
    </div>`).join('');
  document.getElementById('rx-notes').value='';
  document.getElementById('rx-modal').classList.add('show');
}

function toggleMed(el,i){
  el.classList.toggle('on');
  const m = medicines[i].name;
  if(selMeds.includes(m)) selMeds=selMeds.filter(x=>x!==m);
  else selMeds.push(m);
}

async function saveRx(){
  if(selAppt===null)return;
  const a = appointments[selAppt];
  const notes = document.getElementById('rx-notes').value;
  const rx = {owner:a.owner,pet:a.pet,phone:a.phone,doctor:myDoc,medicines:selMeds.join(', '),notes,date:new Date().toLocaleDateString('en-IN'),apptId:a.id};
  try{
    await fetch(`${BACKEND}/save-prescription`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(rx)});
    toast('✅ Prescription save ho gayi!');
    closeRx();
  }catch(e){toast('❌ Save nahi ho paya');}
}

function sendRxWA(){
  if(selAppt===null)return;
  const a = appointments[selAppt];
  const notes = document.getElementById('rx-notes').value;
  const meds = selMeds.join(', ')||'—';
  const msg = encodeURIComponent(`🏥 *Vetraj Pet Hospital*\n\nNamaskar ${a.owner} ji!\n\n*${a.pet}* ke liye prescription:\n\n💊 *Medicines:*\n${meds}\n\n📋 *Notes:* ${notes||'—'}\n\n👨‍⚕️ ${myDoc}\n📞 9568606006 | vetraj.com`);
  window.open(`https://wa.me/91${a.phone}?text=${msg}`,'_blank');
  toast('📤 WhatsApp khul gaya!');
}

function closeRx(){ document.getElementById('rx-modal').classList.remove('show'); }

function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

loadDocSelect();
</script>
</body>
</html>
