const calcFood = (wt,days,cond,unit="kg") => {
  days = String(days||"365").replace(/[^0-9]/g,"") || "365";
  let wtNum = parseFloat(wt)||10;
  if(unit==="g") wtNum = wtNum/1000;
  const w=wtNum, d=parseInt(days)||365;
  const pct=d<180?0.06:cond==="obesity"?0.018:0.025;
  const base=Math.round(w*pct*1000);
  return `${base}–${base+50}`;
};
const yrAge  = d => { const n=parseInt(d||'0'); return !isNaN(n)&&n>0 ? (n/365).toFixed(1) : '?'; };
const isAd   = d => { const n=parseInt(d||'0'); return !isNaN(n) ? n>=180 : (String(d).includes('year')||String(d).includes('3-7')||String(d).includes('7+')); };

class ChartErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={error:null};}
  componentDidCatch(e){this.setState({error:e.message});}
  render(){
    if(this.state.error) return (
      <div style={{padding:20,textAlign:"center",background:"#fff3e0",borderRadius:12,margin:10}}>
        <div style={{fontSize:24,marginBottom:8}}>⚠️</div>
        <div style={{fontWeight:700,color:"#e65100",marginBottom:8}}>Chart render mein error aaya</div>
        <div style={{fontSize:11,color:"#666",marginBottom:12}}>{this.state.error}</div>
        <button onClick={()=>this.setState({error:null})} style={{background:"#ff6b35",color:"white",border:"none",padding:"8px 16px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>Dobara Try Karein</button>
      </div>
    );
    return this.props.children;
  }
}

        <div style={{background:"#f0f9ff",padding:"10px 13px",borderRadius:10,fontSize:12,margin:"14px 0",border:`1px solid ${C.teal}`,lineHeight:1.6}}>
          <b>AI will optimize:</b> {(NUT[form.condition]||NUT.normal).label}<br/>
          {(NUT[form.condition]||NUT.normal).c}% Carbs / {(NUT[form.condition]||NUT.normal).v}% Veg / {(NUT[form.condition]||NUT.normal).p}% Protein
        </div>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={()=>setStep(2)} color="#999" style={{flex:1}}>← Back</Btn>
          <Btn onClick={()=>setScreen("plan")} color={C.teal} style={{flex:2}}>Choose Plan →</Btn>
        </div>
      </Shell>
    );
  }

  // ══════════════════════════════════════════════════════
  //  PLAN SELECTION (only unlocked plans)
  // ══════════════════════════════════════════════════════
  if(screen==="plan") return (
    <div style={{fontFamily:"'Segoe UI',Arial,sans-serif",background:C.bg,minHeight:"100vh",padding:14}}>
      <div style={{maxWidth:460,margin:"0 auto"}}>
        <div style={{background:C.navy,borderRadius:12,padding:"12px 16px",textAlign:"center",marginBottom:14}}>
          <Logo sz={20}/>
        </div>
        <Steps cur={4}/>
        <div style={{fontWeight:900,color:C.navy,fontSize:16,textAlign:"center",marginBottom:4}}>
          Select Plan for {form.petName}
        </div>
        <div style={{color:"#888",fontSize:12,textAlign:"center",marginBottom:14}}>
          Start with Basic → see results → upgrade anytime
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
          {PLANS.filter(p=>!p.locked).map(p=>{
            const sel=plan?.id===p.id;
            return (
              <div key={p.id} onClick={()=>setPlan(p)} style={{
                background:sel?C.navy:p.color,border:`2px solid ${sel?C.teal:p.border}`,
                borderRadius:14,padding:"14px 16px",cursor:"pointer",transition:"all 0.12s",
              }}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{background:sel?C.teal:p.badgeColor,color:"white",fontSize:9,fontWeight:"bold",padding:"2px 8px",borderRadius:20,display:"inline-block",marginBottom:4}}>
                      {p.badge}
                    </div>
                    <div style={{fontWeight:900,fontSize:14,color:sel?"white":C.navy}}>{p.label}</div>
                    <div style={{fontSize:11,color:sel?"rgba(255,255,255,0.65)":"#666",marginTop:1}}>{p.tag}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontWeight:900,fontSize:24,color:sel?C.gold:p.border}}>₹{p.price}</div>
                    {sel&&<div style={{fontSize:11,color:C.teal}}>✔ Selected</div>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={()=>{setScreen("form");setStep(3);}} color="#999" style={{flex:1}}>← Back</Btn>
          <Btn onClick={()=>setScreen("payment")} color={C.orange} style={{flex:2}} disabled={!plan}>
            Pay ₹{plan?.price||"—"} →
          </Btn>
        </div>
      </div>
    </div>
  );

  // ══════════════════════════════════════════════════════
  //  PAYMENT
  // ══════════════════════════════════════════════════════
  if(screen==="payment") return (
    <div style={{fontFamily:"'Segoe UI',Arial,sans-serif",background:C.bg,minHeight:"100vh",padding:14}}>
      <div style={{maxWidth:460,margin:"0 auto"}}>
        <div style={{background:C.navy,borderRadius:12,padding:"12px 16px",textAlign:"center",marginBottom:16}}>
          <Logo sz={20}/>
          <div style={{color:"rgba(255,255,255,0.55)",fontSize:10,marginTop:2}}>Secure Payment</div>
        </div>

        {/* Order summary */}
        <div style={{background:"white",borderRadius:12,padding:14,marginBottom:10,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
          <div style={{fontWeight:900,color:C.navy,fontSize:13,marginBottom:10}}>📋 Order Summary</div>
          {[["Pet Parent",form.ownerName],["WhatsApp",form.mobile],["City",form.city],
            ["Pet",`${form.petName} (${form.breed})`],["Weight",`${form.weight}kg`],
            ["Condition",form.condition],["Plan",plan?.label]].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",borderBottom:"1px solid #f5f5f5"}}>
              <span style={{color:"#888"}}>{k}</span>
              <span style={{fontWeight:"bold",color:C.navy}}>{v}</span>
            </div>
          ))}
          <div style={{display:"flex",justifyContent:"space-between",marginTop:9,paddingTop:9,borderTop:`2px solid ${C.teal}`}}>
            <span style={{fontWeight:900,fontSize:15}}>Total</span>
            <span style={{fontWeight:900,fontSize:22,color:C.orange}}>₹{plan?.price}</span>
          </div>
        </div>

        {/* PROMO CODE */}
        <div style={{background:"#f0f9ff",border:"2px solid #00c4d4",borderRadius:12,padding:14,marginBottom:12}}>
          <div style={{fontWeight:900,color:C.navy,fontSize:12,marginBottom:8}}>🎟️ Promo Code Hai?</div>
          <div style={{display:"flex",gap:8}}>
            <input onInput={e=>setPromoCode(e.target.value.toUpperCase())} onKeyUp={e=>setPromoCode(e.target.value.toUpperCase())}
              onKeyDown={e=>e.key==="Enter"&&checkPromo()}
              placeholder="Enter promo code..."
              style={{...inp,flex:1,fontSize:13,padding:"9px 12px"}}/>
            <button onClick={checkPromo} style={{background:C.teal,color:"white",border:"none",
              borderRadius:9,padding:"9px 14px",fontSize:12,fontWeight:"bold",cursor:"pointer",fontFamily:"inherit"}}>Apply</button>
          </div>
          {promoMsg&&<div style={{fontSize:12,marginTop:6,fontWeight:"bold",
            color:promoMsg.startsWith("✅")?"#16a34a":"#dc2626"}}>{promoMsg}</div>}
        </div>

        {/* Razorpay */}
        <div style={{background:"white",borderRadius:12,padding:14,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
          <div style={{fontWeight:900,color:C.navy,fontSize:12,marginBottom:9}}>💳 Pay via Razorpay</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
            {[["📱","UPI"],["💳","Card"],["🏦","Net Banking"],["👛","Wallet"]].map(([ic,m])=>(
              <div key={m} style={{background:"#f8f8f8",borderRadius:9,padding:"9px",textAlign:"center",fontSize:11,color:"#555"}}>
                <div style={{fontSize:18,marginBottom:2}}>{ic}</div>{m}
              </div>
            ))}
          </div>
          <div style={{fontSize:9,color:"#bbb",textAlign:"center",marginTop:9}}>🔒 256-bit SSL Secured by Razorpay</div>
        </div>

        <Btn onClick={()=>{setLoading(true);setTimeout(()=>{setLoading(false);generate();},1500);}}
          disabled={loading} color={C.orange} style={{width:"100%",fontSize:14,padding:"13px"}}>
          {loading?"⏳ Processing…":`🔒 Pay ₹${plan?.price} Securely`}
        </Btn>
        <div style={{textAlign:"center",marginTop:9}}>
          <span onClick={()=>setScreen("plan")} style={{fontSize:11,color:"#bbb",cursor:"pointer"}}>← Change Plan</span>
        </div>
      </div>
    </div>
  );

  // ══════════════════════════════════════════════════════
  //  GENERATING
  // ══════════════════════════════════════════════════════
  if(screen==="generating") return (
    <div style={{fontFamily:"'Segoe UI',Arial,sans-serif",background:C.navy,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14,padding:24,textAlign:"center"}}>
      <Logo sz={28}/>
      <div style={{fontSize:54,animation:"spin 3s linear infinite"}}>🐾</div>
      <div style={{color:"white",fontSize:20,fontWeight:900,lineHeight:1.3}}>
        Preparing {form.petName}'s<br/><span style={{color:C.teal}}>Personalized Chart</span>
      </div>
      <div style={{color:"rgba(255,255,255,0.55)",fontSize:12,maxWidth:250}}>
        AI analyzing {form.breed}'s health profile…
      </div>
      <div style={{width:200,height:5,background:"rgba(255,255,255,0.1)",borderRadius:10,overflow:"hidden"}}>
        <div style={{height:"100%",background:C.teal,borderRadius:10,animation:"load 2s ease-in-out infinite"}}/>
      </div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}} @keyframes load{0%,100%{width:15%}50%{width:85%}}`}</style>
    </div>
  );

  // ══════════════════════════════════════════════════════
  //  CHART
  // ══════════════════════════════════════════════════════
  if(screen==="chart") return (
    <div style={{fontFamily:"'Segoe UI',Arial,sans-serif",background:C.bg}}>
      {devOpen&&<DevPanel leads={leads} onClose={()=>setDevOpen(false)}/>}
      <div className="no-print" style={{display:"flex",gap:7,padding:"9px 12px",background:C.navy,position:"sticky",top:0,zIndex:100,alignItems:"center",flexWrap:"wrap"}}>
        <div onClick={logoTap} style={{cursor:"pointer"}}><Logo sz={14}/></div>
        <span style={{color:"white",fontSize:11,flex:1}}>{form.petName} ({form.breed}) — {plan?.label}</span>
        <button onClick={()=>{
          // Reset only pet details, keep plan so no repayment needed
          setForm(f=>({...f,petName:"",breed:"",ageDays:"",ageVal:"",weight:"",petType:"dog",gender:"Male",dietType:"veg",activity:"medium",condition:"normal",conditionNote:""}));
          setChart(null);
          setScreen("form");
          setStep(1);
        }} style={{background:"rgba(255,255,255,0.15)",color:"white",border:"none",borderRadius:7,padding:"5px 10px",fontSize:11,cursor:"pointer"}}>＋ New</button>
        <button onClick={generate} style={{background:"rgba(255,255,255,0.15)",color:"white",border:"none",borderRadius:7,padding:"5px 10px",fontSize:11,cursor:"pointer"}}>🔄 Regen</button>
        <button onClick={()=>{
          // Open WhatsApp with chart info
          setTimeout(()=>{
            const msg=encodeURIComponent(`🐾 *Vetraj Pet Food Chart*

*${form.petName}* (${form.breed}) ka personalized food chart taiyaar hai!

Owner: ${form.ownerName}
📍 ${form.city}

PDF download ke liye: PDF Download button dabao → "Save as PDF" select karein.

📞 9568606006 | vetraj.com`);
            window.open(`https://wa.me/91${form.mobile}?text=${msg}`,"_blank");
          },500);
        }} style={{background:"#25D366",color:"white",border:"none",borderRadius:7,padding:"5px 10px",fontSize:11,cursor:"pointer",fontWeight:"bold"}}>📲 WA</button>

        <button onClick={()=>{
          window.print();
        }} style={{background:C.teal,color:"white",border:"none",borderRadius:7,padding:"5px 10px",fontSize:11,cursor:"pointer",fontWeight:"bold"}}>🖨️ PDF Download</button>
      </div>
      <div className="no-print" style={{background:"#e8f8e8",padding:"6px 14px",textAlign:"center",fontSize:11,color:"#2d6a2d",borderBottom:"1px solid #c8f0c8"}}>
        ✅ Chart Ready — {plan?.label} | {form.ownerName} | {form.mobile} | {form.city}
      </div>
      <div id="vetraj-chart" style={{padding:"10px 10px 24px"}}>
        {chart ? (
          <ChartErrorBoundary>
            <ChartPDF form={form} plan={plan} data={chart} chartId={chartId}/>
          </ChartErrorBoundary>
        ) : (
          <div style={{textAlign:"center",padding:40,color:"#666"}}>
            <div style={{fontSize:32,marginBottom:12}}>🔄</div>
            <div style={{fontWeight:700}}>Chart load ho raha hai...</div>
          </div>
        )}
      </div>
      <style>{`
        @media print{
          .no-print{display:none!important}
          body{margin:0;padding:0;background:white}
          *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
          @page{margin:8mm;size:A4 portrait}
          table{page-break-inside:avoid}
          td{font-size:9pt!important;line-height:1.4!important}
          th{font-size:9pt!important}
          div{page-break-inside:avoid}
          #vetraj-chart{padding:0!important}
        }
      `}</style>
    </div>
  );

  return null;
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
