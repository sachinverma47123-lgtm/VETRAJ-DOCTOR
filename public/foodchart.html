const calcFood = (wt,days,cond,unit="kg") => {
  days = String(days||"365").replace(/[^0-9]/g,"") || "365";
  let wtNum = parseFloat(wt)||10;
  if(unit==="g") wtNum = wtNum/1000;
  const w=wtNum, d=parseInt(days)||365;
  const pct=d<180?0.06:cond==="obesity"?0.018:0.025;
  const base=Math.round(w*pct*1000);
  return `${base}–${base+50}`;
};

// ── Admin config (localStorage-backed) ──────────────────
const DEFAULT_PRICES = {p199:199,p399:399,p1999:1999,p2999:2999,p3999:3999};
const DEFAULT_PROMOS = []; // No defaults — admin sets their own codes

const getAdminConfig = () => {
  // Priority 1: URL param _c (from dashboard "Copy Link" button)
  try {
    const urlCfg = new URLSearchParams(window.location.search).get("_c");
    if(urlCfg){
      const parsed = JSON.parse(atob(urlCfg));
      // Also save to localStorage so it persists
      localStorage.setItem("vetraj_admin_config", JSON.stringify(parsed));
      return parsed;
    }
  } catch(e){}
  // Priority 2: localStorage
  try {
    const saved = localStorage.getItem("vetraj_admin_config");
    if(saved) return JSON.parse(saved);
  } catch(e){}
  return { promoCodes: DEFAULT_PROMOS, prices: {...DEFAULT_PRICES} };
};
const saveAdminConfig = (cfg) => {
  try { localStorage.setItem("vetraj_admin_config", JSON.stringify(cfg)); } catch(e){}
};

// getLivePrice — ALWAYS reads fresh from localStorage
const getLivePrice = (planId) => {
  try {
    const cfg = getAdminConfig();
    if(cfg.prices && cfg.prices[planId]) return cfg.prices[planId];
  } catch(e){}
  return DEFAULT_PRICES[planId] || 0;
};

    );
    return this.props.children;
  }

              onChange={e=>setPromoCode(e.target.value.toUpperCase())}
              onKeyDown={e=>e.key==="Enter"&&checkPromo()}
              placeholder="Enter promo code..."
              autoComplete="off"
              name="x-promo-field"
              style={{...inp,flex:1,fontSize:13,padding:"9px 12px"}}
            />
            <button onClick={checkPromo} style={{background:C.teal,color:"white",border:"none",
              borderRadius:9,padding:"9px 14px",fontSize:12,fontWeight:"bold",cursor:"pointer",fontFamily:"inherit"}}>Apply</button>
          </div>
          {promoMsg&&<div style={{fontSize:12,marginTop:6,fontWeight:"bold",
            color:promoMsg.startsWith("✅")?"#16a34a":"#dc2626"}}>{promoMsg}</div>}
        </div>

        {/* Razorpay */}
        <div style={{background:"white",borderRadius:12,padding:14,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
          <div style={{fontWeight:900,color:C.navy,fontSize:12,marginBottom:9}}>💳 Pay via Razorpay</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
            {[["📱","UPI"],["💳","Card"],["🏦","Net Banking"],["👛","Wallet"]].map(([ic,m])=>(
              <div key={m} style={{background:"#f8f8f8",borderRadius:9,padding:"9px",textAlign:"center",fontSize:11,color:"#555"}}>
                <div style={{fontSize:18,marginBottom:2}}>{ic}</div>{m}
              </div>
            ))}
          </div>
          <div style={{fontSize:9,color:"#bbb",textAlign:"center",marginTop:9}}>🔒 256-bit SSL Secured by Razorpay</div>
        </div>

        <Btn onClick={()=>{setLoading(true);setTimeout(()=>{setLoading(false);generate();},1500);}}
          disabled={loading} color={C.orange} style={{width:"100%",fontSize:14,padding:"13px"}}>
          {loading?"⏳ Processing…":`🔒 Pay ₹${getLivePrice(plan?.id||"p399")} Securely`}
        </Btn>
        <div style={{textAlign:"center",marginTop:9}}>
          <span onClick={()=>setScreen("plan")} style={{fontSize:11,color:"#bbb",cursor:"pointer"}}>← Change Plan</span>
        </div>
      </div>
    </div>
  );

  // ══════════════════════════════════════════════════════
  //  GENERATING
  // ══════════════════════════════════════════════════════
  if(screen==="generating") return (
    <div style={{fontFamily:"'Segoe UI',Arial,sans-serif",background:C.navy,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14,padding:24,textAlign:"center"}}>
      <Logo sz={28}/>
      <div style={{fontSize:54,animation:"spin 3s linear infinite"}}>🐾</div>
      <div style={{color:"white",fontSize:20,fontWeight:900,lineHeight:1.3}}>
        Preparing {form.petName}'s<br/><span style={{color:C.teal}}>Personalized Chart</span>
      </div>
      <div style={{color:"rgba(255,255,255,0.55)",fontSize:12,maxWidth:250}}>
        AI analyzing {form.breed}'s health profile…
      </div>
      <div style={{width:200,height:5,background:"rgba(255,255,255,0.1)",borderRadius:10,overflow:"hidden"}}>
        <div style={{height:"100%",background:C.teal,borderRadius:10,animation:"load 2s ease-in-out infinite"}}/>
      </div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}} @keyframes load{0%,100%{width:15%}50%{width:85%}}`}</style>
    </div>
  );

  // ══════════════════════════════════════════════════════
  //  CHART
  // ══════════════════════════════════════════════════════
  if(screen==="chart") return (
    <div style={{fontFamily:"'Segoe UI',Arial,sans-serif",background:C.bg}}>
      {devOpen&&<DevPanel leads={leads} onClose={()=>setDevOpen(false)}/>}
      <div className="no-print" style={{display:"flex",gap:7,padding:"9px 12px",background:C.navy,position:"sticky",top:0,zIndex:100,alignItems:"center",flexWrap:"wrap"}}>
        <div onClick={logoTap} style={{cursor:"pointer"}}><Logo sz={14}/></div>
        <span style={{color:"white",fontSize:11,flex:1}}>{form.petName} ({form.breed}) — {plan?.label}</span>
        <button onClick={()=>{
          // Reset only pet details, keep plan so no repayment needed
          setForm(f=>({...f,petName:"",breed:"",ageDays:"",ageVal:"",weight:"",petType:"dog",gender:"Male",dietType:"veg",activity:"medium",condition:"normal",conditionNote:""}));
          setChart(null);
          setScreen("form");
          setStep(1);
        }} style={{background:"rgba(255,255,255,0.15)",color:"white",border:"none",borderRadius:7,padding:"5px 10px",fontSize:11,cursor:"pointer"}}>＋ New</button>
        <button onClick={generate} style={{background:"rgba(255,255,255,0.15)",color:"white",border:"none",borderRadius:7,padding:"5px 10px",fontSize:11,cursor:"pointer"}}>🔄 Regen</button>
        <button onClick={()=>{
          // Open WhatsApp with chart info
          setTimeout(()=>{
            const msg=encodeURIComponent(`🐾 *Vetraj Pet Food Chart*

*${form.petName}* (${form.breed}) ka personalized food chart taiyaar hai!

Owner: ${form.ownerName}
📍 ${form.city}

PDF download ke liye: PDF Download button dabao → "Save as PDF" select karein.

📞 9568606006 | vetraj.com`);
            window.open(`https://wa.me/91${form.mobile}?text=${msg}`,"_blank");
          },500);
        }} style={{background:"#25D366",color:"white",border:"none",borderRadius:7,padding:"5px 10px",fontSize:11,cursor:"pointer",fontWeight:"bold"}}>📲 WA</button>

        <button onClick={async ()=>{
          const btn = document.getElementById('pdf-dl-btn');
          btn.innerHTML = '⏳ Generating...';
          btn.disabled = true;
          try {
            const { jsPDF } = window.jspdf;
            const chartEl = document.getElementById('vetraj-chart');
            if(!chartEl){ alert('Chart not found'); return; }

            // Clone chart at full 1100px width — no overflow clipping
            const RENDER_W = 1100;
            const wrapper = document.createElement('div');
            wrapper.style.cssText = 'position:fixed;top:-9999px;left:0;width:'+RENDER_W+'px;background:white;overflow:visible;z-index:-1;';
            const clone = chartEl.cloneNode(true);
            clone.style.cssText = 'width:'+RENDER_W+'px;max-width:none;overflow:visible;background:white;padding:8px;';
            clone.querySelectorAll('div,[style]').forEach(el=>{
              el.style.overflowX='visible';
              el.style.maxWidth='none';
            });
            clone.querySelectorAll('th,td').forEach(c=>{
              c.style.fontSize='9px';
              c.style.padding='4px 5px';
              c.style.wordBreak='break-word';
              c.style.whiteSpace='normal';
            });
            wrapper.appendChild(clone);
            document.body.appendChild(wrapper);
            await new Promise(r=>setTimeout(r,250));

            const canvas = await window.html2canvas(clone,{
              scale:1.8, useCORS:true, allowTaint:true,
              backgroundColor:'#ffffff', logging:false,
              width:RENDER_W, height:clone.scrollHeight,
              windowWidth:RENDER_W+40, scrollX:0, scrollY:0,
            });
            document.body.removeChild(wrapper);

            // A4 landscape PDF
            const pdf = new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
            const pgW=pdf.internal.pageSize.getWidth();
            const pgH=pdf.internal.pageSize.getHeight();
            const mg=5, useW=pgW-mg*2, useH=pgH-mg*2;
            const mmPx=useW/canvas.width;
            const pxPg=Math.floor(useH/mmPx);
            let y=0, pg=0;
            while(y<canvas.height){
              if(pg>0) pdf.addPage();
              const slPx=Math.min(pxPg,canvas.height-y);
              const slMm=slPx*mmPx;
              const sc=document.createElement('canvas');
              sc.width=canvas.width; sc.height=Math.ceil(slPx);
              const ctx=sc.getContext('2d');
              ctx.fillStyle='#fff'; ctx.fillRect(0,0,sc.width,sc.height);
              ctx.drawImage(canvas,0,Math.floor(y),canvas.width,Math.ceil(slPx),0,0,canvas.width,Math.ceil(slPx));
              pdf.addImage(sc.toDataURL('image/jpeg',0.92),'JPEG',mg,mg,useW,slMm);
              y+=slPx; pg++;
            }
            // Direct PDF download
            const fname='Vetraj_'+(form.petName||'Pet').replace(/\s+/g,'_')+'_FoodChart.pdf';
            pdf.save(fname);
            btn.innerHTML='✅ Downloaded!';
            setTimeout(()=>{btn.innerHTML='⬇️ PDF';btn.disabled=false;},2500);
          } catch(e){
            console.error(e);
            btn.innerHTML='⬇️ PDF';
            btn.disabled=false;
            alert('PDF error: '+e.message);
          }
        }} id="pdf-dl-btn" style={{background:C.teal,color:"white",border:"none",borderRadius:7,padding:"5px 12px",fontSize:11,cursor:"pointer",fontWeight:"bold"}}>⬇️ PDF</button>
      </div>
      <div className="no-print" style={{background:"#e8f8e8",padding:"6px 14px",textAlign:"center",fontSize:11,color:"#2d6a2d",borderBottom:"1px solid #c8f0c8"}}>
        ✅ Chart Ready — {plan?.label} | {form.ownerName} | {form.mobile} | {form.city}
      </div>
      <div id="vetraj-chart" style={{padding:"10px 10px 24px"}}>
        {chart ? (
          <ChartErrorBoundary>
            <ChartPDF form={form} plan={plan} data={chart} chartId={chartId}/>
          </ChartErrorBoundary>
        ) : (
          <div style={{textAlign:"center",padding:40,color:"#666"}}>
            <div style={{fontSize:32,marginBottom:12}}>🔄</div>
            <div style={{fontWeight:700}}>Chart load ho raha hai...</div>
          </div>
        )}
      </div>
      <style>{`
        @media print{
          .no-print{display:none!important}
          body{margin:0;padding:0;background:white}
          *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
          @page{margin:8mm;size:A4 portrait}
          table{page-break-inside:avoid}
          td{font-size:9pt!important;line-height:1.4!important}
          th{font-size:9pt!important}
          div{page-break-inside:avoid}
          #vetraj-chart{padding:0!important}
        }
      `}</style>
    </div>
  );

  return null;
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
